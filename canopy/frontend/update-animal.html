<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>CANOPY | Update Animal Count</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link href="styles.css" rel="stylesheet"/>
<script id="tailwind-config">
    tailwind.config = {
        darkMode: "class",
        theme: {
            extend: {
                colors: { "primary": "#1f7a63", "background-light": "#f6f8f7", "background-dark": "#131f1c" },
                fontFamily: { "display": ["Inter", "sans-serif"] },
                borderRadius: { "DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px" },
            },
        },
    }
</script>
<style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 antialiased">
<div class="flex h-screen overflow-hidden">
<!-- Sidebar -->
<aside class="w-72 bg-white dark:bg-background-dark border-r border-primary/10 flex flex-col shrink-0 hidden md:flex">
<div class="p-6 flex items-center gap-3">
<div class="size-10 rounded-lg bg-primary flex items-center justify-center text-white">
<span class="material-symbols-outlined text-2xl">forest</span>
</div>
<div class="flex flex-col">
<h1 class="text-primary font-bold text-xl leading-tight tracking-tight">CANOPY</h1>
<p class="text-xs font-medium text-primary/60 uppercase tracking-widest">Management</p>
</div>
</div>
<nav class="flex-1 px-4 space-y-1 mt-4">
<a class="flex items-center gap-3 px-4 py-3 rounded-xl text-slate-600 dark:text-slate-400 hover:bg-primary/10 hover:text-primary transition-colors" href="dashboard.html">
<span class="material-symbols-outlined">dashboard</span><span class="font-medium">Dashboard</span>
</a>
<a class="flex items-center gap-3 px-4 py-3 rounded-xl text-slate-600 dark:text-slate-400 hover:bg-primary/10 hover:text-primary transition-colors" href="animals.html">
<span class="material-symbols-outlined">pets</span><span class="font-medium">Animals</span>
</a>
<a class="flex items-center gap-3 px-4 py-3 rounded-xl bg-primary text-white" href="update-animal.html">
<span class="material-symbols-outlined">history</span><span class="font-medium">Update Count</span>
</a>
<a class="flex items-center gap-3 px-4 py-3 rounded-xl text-slate-600 dark:text-slate-400 hover:bg-primary/10 hover:text-primary transition-colors" href="add-animal.html">
<span class="material-symbols-outlined">add_circle</span><span class="font-medium">Add Animal</span>
</a>
</nav>
<div class="p-4 border-t border-primary/10">
<button onclick="logout()" class="flex items-center gap-3 px-4 py-3 rounded-xl text-slate-600 dark:text-slate-400 hover:bg-red-50 hover:text-red-600 transition-colors w-full">
<span class="material-symbols-outlined">logout</span><span class="font-medium">Logout</span>
</button>
</div>
</aside>
<!-- Main -->
<main class="flex-1 flex flex-col overflow-y-auto">
<header class="h-20 bg-white/80 dark:bg-background-dark/80 backdrop-blur-md border-b border-primary/10 px-8 flex items-center sticky top-0 z-10">
<h2 class="text-xl font-bold text-slate-800 dark:text-slate-100">Update Animal Count</h2>
</header>
<div class="p-8 max-w-2xl mx-auto w-full fade-in">
<div class="bg-white dark:bg-slate-900 rounded-3xl border border-primary/5 shadow-md p-8">
<div class="flex items-center gap-3 mb-8">
<div class="p-3 bg-primary/10 rounded-xl">
<span class="material-symbols-outlined text-primary text-2xl">edit_note</span>
</div>
<div>
<h3 class="text-2xl font-black tracking-tight">Update Population Count</h3>
<p class="text-slate-500 text-sm">Select an animal and update its current population count.</p>
</div>
</div>

<form id="update-form" class="space-y-6">
<div class="space-y-2">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300 ml-1">Select Animal</label>
<select id="animal-select" class="block w-full h-14 bg-background-light dark:bg-slate-800/50 border border-primary/10 rounded-xl focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all text-slate-900 dark:text-white px-4" required>
<option value="">Loading animals...</option>
</select>
</div>

<div id="animal-info" class="hidden bg-primary/5 rounded-xl p-4 flex items-center gap-4">
<div class="size-16 rounded-xl bg-cover bg-center border border-primary/10" id="animal-preview-img"></div>
<div>
<p class="font-bold text-lg" id="animal-preview-name">-</p>
<p class="text-sm text-slate-500" id="animal-preview-species">-</p>
<p class="text-sm text-slate-500">Current count: <span class="text-primary font-bold" id="animal-preview-count">-</span></p>
</div>
</div>

<div class="space-y-2">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300 ml-1">New Count</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400 group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined">tag</span>
</div>
<input id="new-count" class="block w-full pl-11 pr-4 h-14 bg-background-light dark:bg-slate-800/50 border border-primary/10 rounded-xl focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all text-slate-900 dark:text-white placeholder:text-slate-400" placeholder="Enter new count" type="number" min="0" required/>
</div>
</div>

<button id="update-btn" class="w-full h-14 bg-primary text-white font-bold rounded-xl shadow-lg shadow-primary/20 hover:bg-primary/90 active:scale-[0.98] transition-all flex items-center justify-center gap-2" type="submit">
<span class="material-symbols-outlined">save</span>
<span>Update Count</span>
</button>
</form>
</div>

<!-- Recent Updates -->
<div class="mt-8 bg-white dark:bg-slate-900 rounded-3xl border border-primary/5 shadow-md overflow-hidden">
<div class="p-6 border-b border-primary/5">
<h5 class="text-lg font-bold">Recently Updated</h5>
</div>
<div id="recent-updates" class="divide-y divide-primary/5">
</div>
</div>
</div>
</main>
</div>
<script src="app.js"></script>
<script>
if (!requireAuth()) { /* redirects */ }

let animalsData = [];

document.addEventListener('DOMContentLoaded', async () => {
    await loadAnimals();

    // Pre-select from URL params
    const params = new URLSearchParams(window.location.search);
    const preselect = params.get('id');
    if (preselect) {
        document.getElementById('animal-select').value = preselect;
        showAnimalInfo(preselect);
    }
});

async function loadAnimals() {
    try {
        animalsData = await getAnimals();
        const select = document.getElementById('animal-select');
        select.innerHTML = '<option value="">-- Select an animal --</option>' +
            animalsData.map(a => `<option value="${a.id}">${a.animal_name} (${a.species})</option>`).join('');

        select.addEventListener('change', (e) => showAnimalInfo(e.target.value));

        renderRecentUpdates();
    } catch (err) {
        showToast('Failed to load animals', 'error');
    }
}

function showAnimalInfo(id) {
    const animal = animalsData.find(a => a.id == id);
    const info = document.getElementById('animal-info');
    if (!animal) { info.classList.add('hidden'); return; }
    info.classList.remove('hidden');
    document.getElementById('animal-preview-img').style.backgroundImage = `url('${getAnimalImage(animal.animal_name)}')`;
    document.getElementById('animal-preview-name').textContent = animal.animal_name;
    document.getElementById('animal-preview-species').textContent = animal.species + ' · ' + animal.enclosure;
    document.getElementById('animal-preview-count').textContent = animal.count;
    document.getElementById('new-count').value = animal.count;
}

function renderRecentUpdates() {
    const recent = animalsData.slice(0, 5);
    document.getElementById('recent-updates').innerHTML = recent.map(a => `
        <div class="flex items-center justify-between px-6 py-4">
            <div class="flex items-center gap-3">
                <div class="size-10 rounded-lg bg-cover bg-center border border-primary/10" style="background-image: url('${getAnimalImage(a.animal_name)}')"></div>
                <div>
                    <p class="font-bold text-sm">${a.animal_name}</p>
                    <p class="text-xs text-slate-500">${a.species}</p>
                </div>
            </div>
            <div class="text-right">
                <p class="font-bold text-primary">${a.count}</p>
                <p class="text-xs text-slate-400">${formatDate(a.last_updated)}</p>
            </div>
        </div>
    `).join('');
}

document.getElementById('update-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const id = document.getElementById('animal-select').value;
    const count = parseInt(document.getElementById('new-count').value);
    if (!id) { showToast('Please select an animal', 'error'); return; }
    if (isNaN(count) || count < 0) { showToast('Please enter a valid count', 'error'); return; }

    const btn = document.getElementById('update-btn');
    btn.disabled = true;
    btn.innerHTML = '<div class="spinner" style="width:20px;height:20px;border-width:3px;"></div> Updating...';

    try {
        await updateAnimalCount(id, count);
        showToast('Animal count updated successfully!', 'success');
        await loadAnimals();
        showAnimalInfo(id);
    } catch (err) {
        showToast(err.message, 'error');
    } finally {
        btn.disabled = false;
        btn.innerHTML = '<span class="material-symbols-outlined">save</span><span>Update Count</span>';
    }
});
</script>
</body></html>
